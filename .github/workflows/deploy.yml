name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 檢查原始碼
        uses: actions/checkout@v4

      - name: 🟢 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 安裝套件並編譯專案
        run: |
          npm ci
          npm run build

      - name: 📤 上傳編譯後的檔案
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: 🌐 正式部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4